syntax = "proto3";
package demo.v1;

// A nested address message.
message Address {
  string city = 1;
  int32  zip  = 2;
}

message Person {
  string  name   = 1;
  int32   age    = 2;
  bool    active = 3;
  repeated string tags = 4;   // repeated scalar
  Address home   = 5;         // nested message
  bytes   blob   = 6;         // binary
}
